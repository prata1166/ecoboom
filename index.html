<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecoboom Portugal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* ✅ não centra verticalmente */
            min-height: 100vh; /* ✅ permite crescer */
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        .logo img {
            width: 200px;
            max-width: 100%;
            margin-bottom: 20px;
        }

        .contactos {
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 250px;
            text-decoration: none;
            color: black;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: auto; /* ✅ evita cortes */
            display: block;
        }

        .card p {
            padding: 15px;
            font-weight: bold;
        }

        /* ✅ Melhor layout em telemóvel */
        @media (max-width: 768px) {
            .links {
                flex-direction: column;
                align-items: center;
            }

            .card {
                width: 90%;
                max-width: 350px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Logotipo -->
    <div class="logo">
        <img src="LogoEcoBoom.jpeg" alt="Ecoboom Logo">
    </div>

    <!-- Contactos -->
    <div class="contactos">
        <h2>Ecoboom Portugal</h2>
        <p>Email: <a href="mailto:ecoboom.portugal@gmail.com">ecoboom.portugal@gmail.com</a></p>
        <p>Telefone: <a href="tel:932961746">932 961 746</a></p>
        <p>Chat On-line:
            <a href="https://1218.3cx.cloud/prata" target="_blank">
                https://1218.3cx.cloud/prata
            </a>
        </p>
    </div>

    <!-- Links -->
    <div class="links">

        <a class="card" href="https://www.ecoboom.es/pt" target="_blank">
            <img src="lojaecoboom.jpg" alt="Loja Ecoboom">
            <p>Visitar eLoja Ecoboom</p>
        </a>

        <a class="card" href="ecoboom360.html">
            <img src="ecoboom360.png" alt="Ecoboom 360">
            <p>Descobrir Ecoboom 360</p>
        </a>

        <a class="card" href="redeparceiros.html">
            <img src="RedeParceiros.png" alt="Rede de Parceiros">
            <p>Rede de Parceiros</p>
        </a>

        <a class="card" href="crechesparceiras.html">
            <img src="CrechesParceiras.png" alt="Creches Parceiras">
            <p>Creches Parceiras</p>
        </a>

    </div>

</div>

</body>
</html>
