<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecoboom Portugal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
        }

        .logo img {
            width: 200px;
            margin-bottom: 20px;
        }

        .contactos {
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 250px;
            text-decoration: none;
            color: black;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card p {
            padding: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Logotipo -->
    <div class="logo">
        <!-- Substitui "logo.png" pelo caminho do teu logotipo -->
        <img src="LogoEcoBoom.jpeg" alt="Ecoboom Logo">
    </div>

    <!-- Contactos -->
    <div class="contactos">
        <h2>Ecoboom Portugal</h2>
        <p>Email: <a href="mailto:ecoboom.portugal@gmail.com">ecoboom.portugal@gmail.com</a></p>
        <p>Telefone: <a href="tel:932961746">932 961 746</a></p>
        <p>Chat On-line: <a href="https://1218.3cx.cloud/prata">https://1218.3cx.cloud/prata</a></p>

    </div>

    <!-- Links com imagem -->
    <div class="links">

        <a class="card" href="https://www.ecoboom.es/pt" target="_blank">
            <!-- Substitui a imagem abaixo -->
            <img src="lojaecoboom.jpg" alt="eLoja Ecoboom">
            <p>Visitar eLoja Ecoboom</p>
        </a>

        <a class="card" href="https://www.ecoboom.pt/ecoboom360" target="_blank">
            <!-- Substitui a imagem abaixo -->
            <img src="ecoboom360.png" alt="Ecoboom 360">
            <p>Descobrir Ecoboom 360</p>
        </a>

    </div>

</div>

</body>
</html>
